version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: barbearia-db
    environment:
      POSTGRES_DB: barbearia
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - barbearia_data:/var/lib/postgresql/data

volumes:
  barbearia_data: